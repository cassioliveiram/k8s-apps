---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: alloy
data:
  config.alloy: |
    // Feito com AI
    // Descobre pods no cluster
    discovery.kubernetes "pods" {
      role = "pod"
    }

    // Filtra apenas pods anotados no padrão Prometheus:
    // prometheus.io/scrape: "true"
    discovery.relabel "pods_scrape" {
      targets = discovery.kubernetes.pods.targets

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scrape"]
        regex         = "true"
        action        = "keep"
      }

      // Porta via annotation prometheus.io/port (obrigatório pra evitar porta errada)
      rule {
        source_labels = ["__address__", "__meta_kubernetes_pod_annotation_prometheus_io_port"]
        regex         = "([^:]+)(?::\\d+)?;(\\d+)"
        target_label  = "__address__"
        replacement   = "$1:$2"
        action        = "replace"
      }

      // Path opcional via prometheus.io/path (default /metrics)
      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_path"]
        regex         = "(.+)"
        target_label  = "__metrics_path__"
        replacement   = "$1"
        action        = "replace"
      }

      // Labels úteis
      rule { source_labels = ["__meta_kubernetes_namespace"]  target_label = "namespace" action = "replace" }
      rule { source_labels = ["__meta_kubernetes_pod_name"]   target_label = "pod"       action = "replace" }
      rule { source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"] target_label = "app" action = "replace" }
    }

    // Scrape
    prometheus.scrape "k8s_pods" {
      targets         = discovery.relabel.pods_scrape.output
      scrape_interval = "30s"
      forward_to      = [prometheus.remote_write.mimir.receiver]
    }

    // Remote write para Mimir
    prometheus.remote_write "mimir" {
      endpoint {
        url = "http://mimir-nginx.observability.svc.cluster.local/api/v1/push"
      }
    }