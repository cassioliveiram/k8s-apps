---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: alloy
data:
  config.alloy: |
    // Feito com AI
    // =====================
    // Discovery: Pods (opt-in por annotations)
    // =====================
    discovery.kubernetes "pods" {
      role = "pod"
    }

    discovery.relabel "pods_scrape" {
      targets = discovery.kubernetes.pods.targets

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scrape"]
        regex         = "true"
        action        = "keep"
      }

      rule {
        source_labels = ["__address__", "__meta_kubernetes_pod_annotation_prometheus_io_port"]
        regex         = "([^:]+)(?::\\d+)?;(\\d+)"
        target_label  = "__address__"
        replacement   = "$1:$2"
        action        = "replace"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_path"]
        regex         = "(.+)"
        target_label  = "__metrics_path__"
        replacement   = "$1"
        action        = "replace"
      }

      rule { source_labels = ["__meta_kubernetes_namespace"] target_label = "namespace" action = "replace" }
      rule { source_labels = ["__meta_kubernetes_pod_name"]  target_label = "pod"       action = "replace" }
      rule { source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"] target_label = "app" action = "replace" }
    }

    prometheus.scrape "k8s_pods_annotated" {
      targets         = discovery.relabel.pods_scrape.output
      scrape_interval = "30s"
      forward_to      = [prometheus.remote_write.mimir.receiver]
    }

    // =====================
    // Discovery: Endpoints (kube-state-metrics sem mexer no chart)
    // =====================
    discovery.kubernetes "endpoints" {
      role = "endpoints"
    }

    discovery.relabel "kube_state_metrics" {
      targets = discovery.kubernetes.endpoints.targets

      // Namespace do service
      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        regex         = "prometheus"
        action        = "keep"
      }

      // Nome do service/endpoints
      rule {
        source_labels = ["__meta_kubernetes_endpoints_name"]
        regex         = "prometheus-kube-state-metrics"
        action        = "keep"
      }

      // Garante que vamos na porta 8080
      // (em endpoints, geralmente vem o nome da porta também, mas o mais confiável é filtrar por número)
      rule {
        source_labels = ["__address__"]
        regex         = ".*:8080"
        action        = "keep"
      }

      // Labels úteis no Mimir/Grafana
      rule { target_label = "job"       replacement = "kube-state-metrics" action = "replace" }
      rule { target_label = "namespace" replacement = "prometheus"         action = "replace" }
    }

    prometheus.scrape "kube_state_metrics" {
      targets         = discovery.relabel.kube_state_metrics.output
      scrape_interval = "30s"
      forward_to      = [prometheus.remote_write.mimir.receiver]
    }

    // =====================
    // Remote write: Mimir
    // =====================
    prometheus.remote_write "mimir" {
      endpoint {
        url = "http://mimir-gateway.mimir.svc.cluster.local/api/v1/push"
      }
    }
