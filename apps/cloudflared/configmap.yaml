apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: cloudflared
data:
  config.yaml: |
    tunnel: k3s-tunnel
    credentials-file: /etc/cloudflared/creds.json
    ingress:
      - hostname: local.cmoreira.dev
        service: http://istio-ingress.istio-system.svc.cluster.local:80
      - hostname: proxmox.local.cmoreira.dev
        service: https://192.168.1.2:8006
        originRequest:
          noTLSVerify: true
      - hostname: argocd.cmoreira.dev
        service: http://istio-ingress.istio-system.svc.cluster.local:80
      - hostname: headlamp.cmoreira.dev
        service: http://istio-ingress.istio-system.svc.cluster.local:80
      - service: http_status:404
